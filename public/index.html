<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartFridge - Tu Nevera Virtual</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="bg-gradient"></div>

    <main class="app-container">
        <header>
            <div class="logo-placeholder"></div>
            <h1>LazyChef</h1>
            <p>Gestiona tus alimentos con inteligencia</p>
        </header>
        
        <section class="card add-section">
            <div class="section-header">
                <h2>Añadir a la Nevera</h2>
            </div>
            
            <div class="buscador-wrapper">
                <input type="text" id="buscador-ingrediente" autocomplete="off" placeholder="¿Qué compraste hoy?" oninput="filtrarSugerencias()">
                <div id="sugerencias" class="sugerencias-box"></div>
            </div>
            
            <button class="btn-primary" onclick="confirmarAdicion()">
                <span>Añadir Ingrediente</span>
                <i class="plus-icon">+</i>
            </button>
        </section>

        <section class="card inventory-section">
            <div class="section-header">
                <h2>Mi Nevera Virtual</h2>
            </div>
            <div id="empty-state" class="empty-state">
                <div class="image-placeholder"></div>
                <p>Tu nevera está vacía. ¡Empieza a llenarla!</p>
            </div>
            <ul id="mi-nevera"></ul>
        </section>
    </main>

    <script src="js/main.js"></script>
</body>
</html>
