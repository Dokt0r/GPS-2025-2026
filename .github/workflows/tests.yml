name: Ejecutar Tests (Front y Back)

# Esto le dice a GitHub cuándo ejecutarse
on:
  push:
    branches: [ "main" , "DEV" ]
  pull_request:
    branches: [ "main", "DEV" ]

jobs:
  # TRABAJO 1: Tests del Backend
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4
      
      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Instalar dependencias del Backend
        working-directory: ./backend
        run: npm install
        
      - name: Ejecutar Tests del Backend
        working-directory: ./backend
        run: npm test

  # TRABAJO 2: Tests del Frontend
  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4
      
      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Instalar dependencias del Frontend
        working-directory: ./frontend
        run: npm install
        
      - name: Ejecutar Tests del Frontend
        working-directory: ./frontend
        run: npm test 
        
  # TRABAJO 3: Desplegar en Vercel SI los tests pasan
  desplegar-vercel:
    needs: [backend-tests, frontend-tests] # Esto asegura que no se despliegue si hay errores
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' # Solo despliega si es un push/merge a main
    steps:
      - name: Avisar a Vercel
        run: curl -X POST ${{ secrets.VERCEL_WEBHOOK }}